      function Home() {

          let ignore = false
          async function load() {
            try {
              const { data, error } = await sb.from('wiki').select('*').limit(1000)
              if (!ignore && !error && data && data.length) {
                const mapped = data.map(r => ({
                  title: r.title || r.name || '',
                  desc: r.description || r.desc || '',
                  tag: r.tag || r.category || ''
                }))
                setStore(mapped)
                setResults(mapped)
              }
            } catch {}
          }
          load()
          return () => { ignore = true }
        }, [])
        function handleSearch(q) {
          setQuery(q)
          if (!q) { setResults(store); return }
          const lower = q.toLowerCase()
          setResults(store.filter(i => (i.title + ' ' + i.desc).toLowerCase().includes(lower)))
          setExpanded({})
        }
        function toggleExpand(idx) {
          setExpanded(prev => ({ ...prev, [idx]: !prev[idx] }))
        }

      function useChecklist() {
        const [items, setItems] = React.useState(() => {
          try {
            const raw = localStorage.getItem('checklist')
            if (raw) return JSON.parse(raw)
          } catch {}
          return initialChecklist.map(i => ({ ...i, done: false }))
        })
        React.useEffect(() => { localStorage.setItem('checklist', JSON.stringify(items)) }, [items])
        function toggle(id) { setItems(prev => prev.map(i => i.id === id ? { ...i, done: !i.done } : i)) }
        function reset() { setItems(initialChecklist.map(i => ({ ...i, done: false }))) }
        return { items, toggle, reset }
      }

      function Checklist() {
        const { items, toggle, reset } = useChecklist()
        const doneCount = items.filter(i => i.done).length
        return (
          <div className="max-w-3xl mx-auto px-6 py-10">
            <h1 className="text-2xl font-semibold text-forest">新手准备清单</h1>
            <div className="mt-2 text-cocoa/70 text-sm">已完成 {doneCount}/{items.length}</div>
            <div className="mt-6 space-y-3">
              {items.map(i => (
                <label key={i.id} className="flex items-start gap-3 rounded-xl border border-sand/60 bg-white p-4 hover:border-sage/60">
                  <input type="checkbox" checked={!!i.done} onChange={() => toggle(i.id)} className="mt-1 w-5 h-5 accent-forest" />
                  <span className={i.done ? 'text-cocoa/60 line-through' : 'text-cocoa'}>{i.text}</span>
                </label>
              ))}
            </div>
            <div className="mt-6 flex gap-3">
              <button onClick={reset} className="px-4 py-2 rounded-lg bg-sage text-cream">重置清单</button>
              <a href="#/" className="px-4 py-2 rounded-lg border border-sand/60 bg-white">返回首页</a>
            </div>
          </div>
        )
      }

        React.useEffect(() => {
          if (isError && msg) {
            setPopupMsg(msg)
            const t = setTimeout(() => setPopupMsg(''), 4000)
            return () => clearTimeout(t)
          }
        }, [isError, msg])
        async function handleLogin() {
          setMsg('')
          const { error } = await sb.auth.signInWithPassword({ email, password })
          if (error) { setIsError(true); setMsg(error.message) }
          else {
            const { data: userData } = await sb.auth.getUser()
            const u = userData?.user
            if (u?.id) {
              await sb.from('profiles').upsert({ id: u.id, email: u.email, nickname: u.user_metadata?.nickname || name })
            }
            setIsError(false); setMsg('登录成功')
            window.location.hash = '/'
          }
        }
        async function handleRegister() {
          setMsg('')
          const { data, error } = await sb.auth.signUp({ email, password, options: { data: { nickname: name }, emailRedirectTo: window.location.origin + '/#/auth' } })
          if (error) { setIsError(true); setMsg(error.message) }
          else {
            setIsError(false); setMsg(data?.user ? '注册成功，已创建用户' : '注册成功，如需验证请查收邮箱')
            try {
              if (data?.user?.id) {
                await sb.from('profiles').upsert({ id: data.user.id, email: data.user.email, nickname: name })
              }
            } catch {}
            try {
              const { error: loginErr } = await sb.auth.signInWithPassword({ email, password })
              if (!loginErr) {
                const { data: userData } = await sb.auth.getUser()
                const u = userData?.user
                if (u?.id) await sb.from('profiles').upsert({ id: u.id, email: u.email, nickname: name })
              }
            } catch {}
          }
        }
        return (
          <div className="max-w-md mx-auto px-6 py-10">
            {popupMsg && <div className="fixed top-4 left-1/2 -translate-x-1/2 z-50 bg-red-600 text-cream px-4 py-2 rounded-lg shadow">{popupMsg}</div>}
            <h1 className="text-2xl font-semibold text-forest">账号中心</h1>
            <div className="mt-6 grid grid-cols-2 p-1 rounded-xl bg-sage/20">
              <button onClick={() => setTab('login')} className={(tab==='login'?'bg-sage text-cream ':'text-forest ')+'rounded-lg py-2'}>登录</button>
              <button onClick={() => setTab('register')} className={(tab==='register'?'bg-sage text-cream ':'text-forest ')+'rounded-lg py-2'}>注册</button>
            </div>
            {tab === 'login' ? (
              <div className="mt-6 space-y-4 rounded-2xl border border-sand/60 bg-white p-6">
                <label className="block">
                  <div className="text-sm text-cocoa/80 mb-1">邮箱</div>
                  <input value={email} onChange={(e)=>setEmail(e.target.value)} type="email" placeholder="you@example.com" className="w-full rounded-lg border border-sand/60 bg-white px-3 py-2 focus:outline-none focus:ring-2 focus:ring-sage/30" />
                </label>
                <label className="block">
                  <div className="text-sm text-cocoa/80 mb-1">密码</div>
                  <input value={password} onChange={(e)=>setPassword(e.target.value)} type="password" placeholder="••••••••" className="w-full rounded-lg border border-sand/60 bg-white px-3 py-2 focus:outline-none focus:ring-2 focus:ring-sage/30" />
                </label>
                <button onClick={handleLogin} className="w-full rounded-lg bg-sage text-cream py-2">登录</button>
                {msg && <div className={"text-xs "+(isError?'text-red-600':'text-cocoa/70')}>{msg}</div>}
              </div>
            ) : (
              <div className="mt-6 space-y-4 rounded-2xl border border-sand/60 bg-white p-6">
                <label className="block">
                  <div className="text-sm text-cocoa/80 mb-1">昵称</div>
                  <input value={name} onChange={(e)=>setName(e.target.value)} placeholder="爱撸猫的我" className="w-full rounded-lg border border-sand/60 bg-white px-3 py-2 focus:outline-none focus:ring-2 focus:ring-sage/30" />
                </label>
                <label className="block">
                  <div className="text-sm text-cocoa/80 mb-1">邮箱</div>
                  <input value={email} onChange={(e)=>setEmail(e.target.value)} type="email" placeholder="you@example.com" className="w-full rounded-lg border border-sand/60 bg-white px-3 py-2 focus:outline-none focus:ring-2 focus:ring-sage/30" />
                </label>
                <label className="block">
                  <div className="text-sm text-cocoa/80 mb-1">密码</div>
                  <input value={password} onChange={(e)=>setPassword(e.target.value)} type="password" placeholder="至少 8 位" className="w-full rounded-lg border border-sand/60 bg-white px-3 py-2 focus:outline-none focus:ring-2 focus:ring-sage/30" />
                </label>
                <button onClick={handleRegister} className="w-full rounded-lg bg-sage text-cream py-2">注册</button>
                {msg && <div className={"text-xs "+(isError?'text-red-600':'text-cocoa/70')}>{msg}</div>}
              </div>
            )}
          </div>
        )
      }

      function Community({ user }) {
        const [items, setItems] = React.useState(communityPosts)
        const [loading, setLoading] = React.useState(true)
        const [showForm, setShowForm] = React.useState(false)
        const [text, setText] = React.useState('')
        const [image, setImage] = React.useState('')
        React.useEffect(() => {
          let ignore = false
          async function load() {
            try {
              const { data, error } = await sb.from('posts').select('*').order('created_at', { ascending: false })
              if (!ignore && !error && data) {
                const mapped = data.map(p => ({
                  id: p.id || Math.random(),
                  user: p.user_name || p.user || (p.author || '匿名'),
                  time: p.created_at ? new Date(p.created_at).toLocaleString() : (p.time || ''),
                  text: p.content || p.text || '',
                  img: p.image_url || p.img || ''
                }))
                setItems(mapped)
              } else {
                if (!ignore) setItems(communityPosts)
              }
            } catch {
              if (!ignore) setItems(communityPosts)
            } finally {
              if (!ignore) setLoading(false)
            }
          }
          load()
          return () => { ignore = true }
        }, [])
        async function submit() {
          if (!user) {
            alert('请先登录')
            return
          }
          const insert = { user_id: user.id, user_name: user.email, content: text, image_url: image }
          const { error } = await sb.from('posts').insert(insert)
          if (!error) {
            const { data } = await sb.from('posts').select('*').order('created_at', { ascending: false })
            if (data) {
              const mapped = data.map(p => ({
                id: p.id || Math.random(),
                user: p.user_name || p.user || (p.author || '匿名'),
                time: p.created_at ? new Date(p.created_at).toLocaleString() : (p.time || ''),
                text: p.content || p.text || '',
                img: p.image_url || p.img || ''
              }))
              setItems(mapped)
            }
            setText('')
            setImage('')
            setShowForm(false)
          } else {
            const local = { id: Math.random(), user: user.email, time: new Date().toLocaleString(), text, img: image }
            setItems([local, ...items])
            setText('')
            setImage('')
            setShowForm(false)
          }
        }
        return (
          <div className="max-w-6xl mx-auto px-6 py-10">
            <div className="flex items-center justify-between">
              <h1 className="text-2xl font-semibold text-forest">宠物日常社区</h1>
              <button onClick={() => setShowForm(v => !v)} className="rounded-lg bg-sage text-cream px-4 py-2">{showForm?'收起':'发布'}</button>
            </div>
            {showForm && (
              <div className="mt-4 rounded-2xl border border-sand/60 bg-white p-4 grid gap-3">
                <input value={text} onChange={(e)=>setText(e.target.value)} placeholder="记下今天和它的日常" className="rounded-lg border border-sand/60 px-3 py-2" />
                <input value={image} onChange={(e)=>setImage(e.target.value)} placeholder="图片 URL（可选）" className="rounded-lg border border-sand/60 px-3 py-2" />
                <button onClick={submit} className="rounded-lg bg-forest text-cream px-4 py-2">发布到社区</button>
              </div>
            )}
            <div className="mt-6 grid sm:grid-cols-2 lg:grid-cols-3 gap-6">
              {items.map(p => (
                <div key={p.id} className="rounded-2xl border border-sand/60 bg-white overflow-hidden">
                  {p.img && <img src={p.img} alt="" className="w-full h-48 object-cover" />}
                  <div className="p-4">
                    <div className="flex items-center justify-between text-sm text-cocoa/70">
                      <div className="font-medium text-cocoa">{p.user}</div>
                      <div>{p.time}</div>
                    </div>
                    <div className="mt-2 text-cocoa">{p.text}</div>
                    <div className="mt-3 flex items-center gap-4 text-sm text-cocoa/70">
                      <button className="hover:text-forest">👍 赞</button>
                      <button className="hover:text-forest">💬 评论</button>
                    </div>
                  </div>
                </div>
              ))}
              {!loading && items.length===0 && <div className="text-sm text-cocoa/70">暂无内容</div>}
            </div>
          </div>
        )
      }

      function Forbidden() {
        const [q, setQ] = React.useState('')
        const [type, setType] = React.useState('全部')
        const filtered = forbiddenData.filter(i => {
          const text = (i.name + i.type + i.note).toLowerCase()
          const okType = type === '全部' || i.type === type
          return okType && text.includes(q.toLowerCase())
        })
        return (
          <div className="max-w-6xl mx-auto px-6 py-10">
            <h1 className="text-2xl font-semibold text-forest">禁食食物/药品数据库</h1>
            <div className="mt-4 flex flex-wrap items-center gap-3">
              <input value={q} onChange={(e) => setQ(e.target.value)} placeholder="搜索食物或药品，如：巧克力、布洛芬" className="flex-1 min-w-[220px] rounded-lg border border-sand/60 bg-white px-3 py-2 focus:outline-none focus:ring-2 focus:ring-sage/30" />
              <select value={type} onChange={(e) => setType(e.target.value)} className="rounded-lg border border-sand/60 bg-white px-3 py-2">
                <option>全部</option>
                <option>食物</option>
                <option>药品</option>
              </select>
            </div>
            <div className="mt-6 rounded-2xl border border-sand/60 overflow-hidden">
              <div className="grid grid-cols-12 bg-sage/20 text-cocoa/80 text-sm">
                <div className="col-span-3 p-3">名称</div>
                <div className="col-span-2 p-3">类别</div>
                <div className="col-span-2 p-3">风险级别</div>
                <div className="col-span-5 p-3">说明</div>
              </div>
              {filtered.map(i => (
                <div key={i.id} className="grid grid-cols-12 border-t border-sand/50 bg-white">
                  <div className="col-span-3 p-3">{i.name}</div>
                  <div className="col-span-2 p-3">{i.type}</div>
                  <div className={"col-span-2 p-3 font-medium "+(i.risk==='高'?'text-red-600':i.risk==='中'?'text-amber-600':'text-forest')}>{i.risk}</div>
                  <div className="col-span-5 p-3 text-cocoa/80">{i.note}</div>
                </div>
              ))}
              {filtered.length === 0 && <div className="p-6 text-sm text-cocoa/70 bg-white">暂无匹配项</div>}
            </div>
            <div className="mt-4 text-xs text-cocoa/60">信息仅供科普参考，若出现中毒风险应联系专业兽医</div>
          </div>
        )
      }

      function Stars({ value }) {
        const full = Math.floor(value)
        const half = value - full >= 0.5
        return (
          <div className="flex items-center">
            {[...Array(full)].map((_, i) => <span key={i} className="text-amber-500">★</span>)}
            {half && <span className="text-amber-500">☆</span>}
            {[...Array(5 - full - (half ? 1 : 0))].map((_, i) => <span key={'e'+i} className="text-sand/60">★</span>)}
          </div>
        )
      }

      function Reviews() {
        return (
          <div className="max-w-6xl mx-auto px-6 py-10">
            <h1 className="text-2xl font-semibold text-forest">宠物粮测评</h1>
            <div className="mt-6 grid sm:grid-cols-2 lg:grid-cols-3 gap-6">
              {foodReviews.map(r => (
                <div key={r.id} className="rounded-2xl border border-sand/60 bg-white overflow-hidden">
                  <img src={r.img} alt="" className="w-full h-40 object-cover" />
                  <div className="p-4">
                    <div className="font-medium text-cocoa">{r.name}</div>
                    <div className="flex items-center gap-2 mt-1">
                      <Stars value={r.rating} />
                      <span className="text-sm text-cocoa/70">{r.rating.toFixed(1)}</span>
                    </div>
                    <div className="mt-3 text-sm">
                      <div className="text-cocoa/70">优点</div>
                      <ul className="list-disc pl-5 text-cocoa">
                        {r.pros.map((p, i) => <li key={i}>{p}</li>)}
                      </ul>
                    </div>
                    <div className="mt-2 text-sm">
                      <div className="text-cocoa/70">注意</div>
                      <ul className="list-disc pl-5 text-cocoa">
                        {r.cons.map((c, i) => <li key={i}>{c}</li>)}
                      </ul>
                    </div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        )
      }

      function getRoute() {
        const hash = window.location.hash || '#/'
        const path = hash.replace('#', '')
        return path
      }

      function App() {
        const [route, setRoute] = React.useState(getRoute())
        const [cursor, setCursor] = React.useState(typeof window !== 'undefined' ? localStorage.getItem('cursorStyle') || 'default' : 'default')
        const { user } = useAuth()
        React.useEffect(() => {
          function onHash() { setRoute(getRoute()) }
          window.addEventListener('hashchange', onHash)
          return () => window.removeEventListener('hashchange', onHash)
        }, [])
        React.useEffect(() => {
          if (cursor === 'cat') {
            document.documentElement.classList.add('cursor-cat')
            document.documentElement.classList.remove('cursor-dog')
          } else if (cursor === 'dog') {
            document.documentElement.classList.add('cursor-dog')
            document.documentElement.classList.remove('cursor-cat')
          } else {
            document.documentElement.classList.remove('cursor-cat')
            document.documentElement.classList.remove('cursor-dog')
          }
          localStorage.setItem('cursorStyle', cursor)
        }, [cursor])
        function renderPage() {
          if (route === '/' || route === '') return <Home />
          if (route === '/checklist') return <Checklist />
          if (route === '/auth') return <Auth />
          if (route === '/community') return <Community user={user} />
          if (route === '/forbidden') return <Forbidden />
          if (route === '/reviews') return <Reviews />
          return <Home />
        }
        return (
          <div className="min-h-screen flex flex-col">
            <SafetyBanner />
            <NavBar cursor={cursor} onCursorChange={setCursor} user={user} onSignOut={() => sb.auth.signOut()} />
            <main className="flex-1">{renderPage()}</main>
            <footer className="border-t border-sand/50 bg-cream px-6 py-8 text-sm text-cocoa/70">
              <div className="max-w-6xl mx-auto flex flex-col md:flex-row items-center md:items-start justify-between gap-4">
                <div>© {new Date().getFullYear()} 新手养宠指南</div>
                <div className="text-cocoa/60">以温馨、高级、简约的人文关怀为设计理念</div>
              </div>
            </footer>
          </div>
        )
      }

      const root = ReactDOM.createRoot(document.getElementById('root'))
      root.render(<App />)
    </script>
  </body>
  </html>
